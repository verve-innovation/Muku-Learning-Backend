<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muku Learning — Admin Control Center</title>
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #09090b;
      --bg-card: rgba(24, 24, 27, 0.6);
      --bg-input: rgba(39, 39, 42, 0.5);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #a1a1aa;
      --accent: #eab308;
      --accent-hover: #facc15;
      --primary-blue: #3b82f6;
      --danger: #ef4444;
      --success: #10b981;
      --font-title: 'Outfit', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
      --glass-blur: blur(16px);
      --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --shadow-glow: 0 0 20px rgba(234, 179, 8, 0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(234, 179, 8, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 25%);
      color: var(--text-main);
      font-family: var(--font-body);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── AUTHENTICATION PAGE ── */
    #auth-page {
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
      background: radial-gradient(circle at 50% 50%, rgba(234, 179, 8, 0.1) 0%, transparent 60%);
    }

    .login-container {
      background: var(--bg-card);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 48px;
      width: 100%; max-width: 440px;
      box-shadow: var(--shadow-lg), var(--shadow-glow);
      text-align: center;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .brand-logo { font-size: 3.5rem; margin-bottom: 16px; display: inline-block; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

    .login-title { font-family: var(--font-title); font-size: 2rem; font-weight: 800; color: var(--text-main); margin-bottom: 8px; }
    .login-sub { color: var(--text-muted); font-size: 1rem; margin-bottom: 32px; }
    
    .form-group { text-align: left; margin-bottom: 24px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-input {
      width: 100%; background: var(--bg-input); border: 1px solid var(--border-color);
      border-radius: 12px; padding: 14px 18px; color: var(--text-main); font-family: var(--font-body);
      font-size: 1rem; outline: none; transition: all 0.3s;
    }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(234, 179, 8, 0.1); background: rgba(39, 39, 42, 0.8); }
    
    .btn {
      width: 100%; background: linear-gradient(135deg, var(--accent) 0%, #d97706 100%);
      color: #1a1a1a; border: none; border-radius: 12px; padding: 16px;
      font-family: var(--font-title); font-weight: 700; font-size: 1.1rem;
      cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 12px rgba(234, 179, 8, 0.3);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(234, 179, 8, 0.4); filter: brightness(1.1); }
    .btn:active { transform: translateY(0); }
    
    .error-msg { color: var(--danger); font-size: 0.9rem; margin-top: 16px; display: none; font-weight: 500; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2); }

    /* ── DASHBOARD LAYOUT ── */
    #dashboard-page { display: none; grid-template-columns: 280px 1fr; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      background: var(--bg-card); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border-right: 1px solid var(--border-color); display: flex; flex-direction: column;
      height: 100vh; position: sticky; top: 0; z-index: 10;
    }
    .sidebar-brand {
      padding: 32px 24px; font-family: var(--font-title); font-size: 1.6rem; font-weight: 800;
      display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border-color);
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.02));
    }
    .sidebar-menu { list-style: none; padding: 24px 16px; flex-grow: 1; overflow-y: auto; }
    .menu-item {
      padding: 14px 18px; border-radius: 12px; cursor: pointer; display: flex; align-items: center;
      gap: 14px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; transition: all 0.3s;
      position: relative; overflow: hidden;
    }
    .menu-item::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 0;
      background: var(--accent); transition: width 0.3s ease; border-radius: 12px 0 0 12px;
    }
    .menu-item:hover { color: var(--text-main); background: var(--bg-input); transform: translateX(4px); }
    .menu-item.active { color: var(--text-main); background: rgba(234, 179, 8, 0.1); }
    .menu-item.active::before { width: 4px; }
    
    .sidebar-footer { padding: 24px; border-top: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.1); }
    .admin-profile { display: flex; align-items: center; gap: 12px; }
    .admin-avatar { font-size: 1.5rem; background: var(--bg-input); width: 42px; height: 42px; display: flex; justify-content: center; align-items: center; border-radius: 12px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); }
    .admin-name { font-size: 0.9rem; font-weight: 700; color: var(--text-main); }
    
    .logout-btn { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--danger); cursor: pointer; font-weight: 600; font-size: 0.85rem; padding: 8px 12px; border-radius: 8px; transition: all 0.2s; }
    .logout-btn:hover { background: var(--danger); color: white; }

    /* Main Area */
    .main-content { padding: 40px 48px; overflow-y: auto; max-height: 100vh; position: relative; }
    .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .content-title { font-family: var(--font-title); font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; }

    /* ── DASHBOARD BLOCKS & CARDS ── */
    .overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 48px; }
    .stat-card {
      background: var(--bg-card); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border-color); border-radius: 20px; padding: 28px;
      display: flex; align-items: center; gap: 24px; transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
    }
    .stat-card::after { content:''; position:absolute; top:0; right:0; width:150px; height:150px; background:radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%); border-radius:50%; transform:translate(30%, -30%); pointer-events:none; }
    .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: rgba(255,255,255,0.2); }
    .stat-icon { font-size: 2.2rem; background: rgba(255,255,255,0.05); width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; border-radius: 16px; color: var(--accent); border: 1px solid rgba(255,255,255,0.05); }
    .stat-num { font-size: 2rem; font-weight: 800; font-family: var(--font-title); line-height: 1.2; }
    .stat-label { color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

    /* ── TABLES AND CRUD ── */
    .table-container {
      background: var(--bg-card); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border-color); border-radius: 20px; overflow: hidden; margin-top: 24px; box-shadow: var(--shadow-sm);
    }
    .table-actions { padding: 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); background: rgba(0,0,0,0.2); }
    .search-input { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 10px; padding: 10px 18px; color: var(--text-main); width: 300px; outline: none; transition: all 0.3s; font-family: var(--font-body); }
    .search-input:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
    
    .add-btn {
      background: linear-gradient(135deg, var(--primary-blue) 0%, #2563eb 100%);
      color: white; padding: 12px 20px; border-radius: 10px; font-weight: 600; border: none; cursor: pointer;
      display: flex; align-items: center; gap: 10px; transition: all 0.3s; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
    .add-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4); filter: brightness(1.1); }
    .add-btn:active { transform: translateY(0); }
    
    .data-table { width: 100%; border-collapse: collapse; text-align: left; }
    .data-table th, .data-table td { padding: 18px 24px; border-bottom: 1px solid var(--border-color); }
    .data-table th { background: rgba(0, 0, 0, 0.3); color: var(--text-muted); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .data-table tr { transition: background 0.2s; }
    .data-table tr:hover { background: rgba(255,255,255,0.02); }
    .data-table tr:last-child td { border-bottom: none; }
    
    .row-action { background: none; border: none; cursor: pointer; font-weight: 600; font-size: 0.9rem; margin-right: 16px; transition: opacity 0.2s; padding: 6px 12px; border-radius: 6px; }
    .row-action:hover { opacity: 0.8; }
    .row-edit { color: var(--accent); background: rgba(234, 179, 8, 0.1); border: 1px solid rgba(234, 179, 8, 0.2); }
    .row-delete { color: var(--danger); background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); }

    /* ── MODAL WINDOWS ── */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: none; justify-content: center; align-items: center; z-index: 1000;
      opacity: 0; transition: opacity 0.3s;
    }
    .modal-overlay.show { display: flex; opacity: 1; }
    
    .modal-content {
      background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 24px;
      padding: 40px; width: 90%; max-width: 540px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      max-height: 90vh; overflow-y: auto;
    }
    .modal-overlay.show .modal-content { transform: scale(1); }
    
    .modal-title { font-family: var(--font-title); font-size: 1.6rem; font-weight: 800; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px; color: var(--text-main); }
    .modal-buttons { display: flex; justify-content: flex-end; gap: 16px; margin-top: 32px; }
    
    .btn-secondary { background: transparent; color: var(--text-main); border: 1px solid var(--border-color); box-shadow: none; }
    .btn-secondary:hover { background: rgba(255,255,255,0.05); transform: none; box-shadow: none; }
    .btn-modal { width: auto; padding: 12px 28px; }

    /* Config panel at the top */
    .config-banner {
      display: flex; justify-content: space-between; background: var(--bg-card); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border-color); border-radius: 16px; padding: 16px 28px; margin-bottom: 40px; align-items: center; box-shadow: var(--shadow-sm);
    }
    .config-title { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* Loading Overlay */
    #tab-content { position: relative; transition: opacity 0.3s ease; min-height: 300px; }
    #tab-content.loading { opacity: 0.6; pointer-events: none; }
    .loader-container {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      display: flex; flex-direction: column; align-items: center; gap: 16px; z-index: 10;
    }
    .spinner {
      width: 48px; height: 48px; border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
    }
    .loader-text { color: var(--text-main); font-weight: 600; letter-spacing: 0.5px; font-size: 0.95rem; }

    /* ── ANIMATIONS ── */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { 100% { transform: rotate(360deg); } }

  </style>
</head>
<body>

  <!-- ── AUTHENTICATION PAGE ── -->
  <div id="auth-page">
    <div class="login-container">
      <div class="brand-logo">🐼</div>
      <h1 class="login-title">Muku Control Panel</h1>
      <p class="login-sub">Admin database access portal</p>
      
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-input" placeholder="admin" required value="admin">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required value="admin123">
        </div>
        <button type="submit" class="btn">Sign In ➔</button>
      </form>
      <div id="login-error" class="error-msg">Invalid username or password.</div>
    </div>
  </div>

  <!-- ── DASHBOARD PAGE ── -->
  <div id="dashboard-page">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span>🐼</span> Muku Admin
      </div>
      <ul class="sidebar-menu">
        <li class="menu-item active" onclick="switchTab('overview', this)">📊 Overview</li>
        <li class="menu-item" onclick="switchTab('users', this)">👥 Users</li>
        <li class="menu-item" onclick="switchTab('categories', this)">🗂️ Categories</li>
        <li class="menu-item" onclick="switchTab('words', this)">📝 Words</li>
        <li class="menu-item" onclick="switchTab('progress', this)">📈 Progress</li>
        <li class="menu-item" onclick="switchTab('sessions', this)">🎓 Sessions</li>
        <li class="menu-item" onclick="switchTab('badges', this)">🏆 Badges</li>
        <li class="menu-item" onclick="switchTab('user-badges', this)">🏅 User Badges</li>
      </ul>
      <div class="sidebar-footer">
        <div class="admin-profile">
          <div class="admin-avatar">🐼</div>
          <div class="admin-name">SysAdmin</div>
        </div>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
      </div>
    </aside>

    <!-- Main Content Panel -->
    <main class="main-content">
      <!-- Config Banner -->
      <div class="config-banner">
        <span class="config-title">Connected API:</span>
        <input type="text" id="api-url-input" class="search-input" style="width: 250px; padding: 6px 12px; font-size: 0.85rem;" value="http://localhost:3000">
      </div>

      <div class="content-header">
        <h2 class="content-title" id="tab-title">Dashboard Overview</h2>
        <div id="tab-header-actions"></div>
      </div>

      <!-- Dynamic Content Wrapper -->
      <div id="tab-content">
        <!-- Renders dynamically -->
      </div>
    </main>
  </div>

  <!-- ── CRUD DYNAMIC FORM MODAL ── -->
  <div class="modal-overlay" id="crud-modal">
    <div class="modal-content">
      <h3 class="modal-title" id="modal-title">Form</h3>
      <form id="crud-form" onsubmit="handleFormSubmit(event)">
        <div id="form-fields">
          <!-- Fields rendered dynamically based on active tab -->
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn btn-secondary btn-modal" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-modal">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── JAVASCRIPT LOGIC ── -->
  <script>
    // State Variables
    let JWT_TOKEN = localStorage.getItem('muku_admin_jwt') || '';
    let ACTIVE_TAB = 'overview';
    let TABLE_DATA = [];

    // On Load Check
    window.onload = () => {
      if (JWT_TOKEN) {
        showDashboard();
      } else {
        showLogin();
      }
    };

    function getApiUrl() {
      return document.getElementById('api-url-input').value.trim();
    }

    // Helper for requests
    async function apiRequest(endpoint, options = {}) {
      const headers = {
        'Content-Type': 'application/json',
      };
      if (JWT_TOKEN) {
        headers['Authorization'] = `Bearer ${JWT_TOKEN}`;
      }

      const res = await fetch(`${getApiUrl()}/api/admin${endpoint}`, {
        ...options,
        headers: {
          ...headers,
          ...options.headers
        }
      });

      if (!res.ok) {
        if (res.status === 403 || res.status === 401) {
          handleLogout();
          throw new Error('Session expired or unauthorized');
        }
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `Server responded with ${res.status}`);
      }
      return res.json();
    }

    // Login Action
    async function handleLogin(e) {
      e.preventDefault();
      const usernameInput = document.getElementById('username').value.trim();
      const passwordInput = document.getElementById('password').value.trim();
      const errorDiv = document.getElementById('login-error');
      errorDiv.style.display = 'none';

      try {
        const res = await fetch(`${getApiUrl()}/api/users/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: usernameInput, password: passwordInput })
        });

        if (!res.ok) {
          throw new Error('Unauthorized');
        }

        const data = await res.json();
        if (data.user.username !== 'admin') {
          alert('Access denied: System admin role required.');
          return;
        }

        JWT_TOKEN = data.token;
        localStorage.setItem('muku_admin_jwt', JWT_TOKEN);
        showDashboard();
      } catch (err) {
        errorDiv.style.display = 'block';
      }
    }

    function showLogin() {
      document.getElementById('auth-page').style.display = 'flex';
      document.getElementById('dashboard-page').style.display = 'none';
    }

    function showDashboard() {
      document.getElementById('auth-page').style.display = 'none';
      document.getElementById('dashboard-page').style.display = 'grid';
      switchTab('overview');
    }

    function handleLogout() {
      JWT_TOKEN = '';
      localStorage.removeItem('muku_admin_jwt');
      showLogin();
    }

    // Switch menu tabs
    function switchTab(tabName, element) {
      ACTIVE_TAB = tabName;
      document.getElementById('tab-title').innerText = tabName.charAt(0).toUpperCase() + tabName.slice(1);
      
      // Update menu highlighting
      if (element) {
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
      }

      loadTabContent();
    }

    // Load active tab contents
    async function loadTabContent() {
      const container = document.getElementById('tab-content');
      const actionContainer = document.getElementById('tab-header-actions');
      
      // Prevent flickering by adding a loading class instead of completely wiping innerHTML
      if(!container.innerHTML.trim() || container.innerHTML.includes('Fetching database records')) {
         container.innerHTML = `<div class="loader-container"><div class="spinner"></div><div class="loader-text">Fetching data...</div></div>`;
      } else {
         container.classList.add('loading');
         if(!document.getElementById('global-spinner')) {
             const spinnerDiv = document.createElement('div');
             spinnerDiv.id = 'global-spinner';
             spinnerDiv.className = 'loader-container';
             spinnerDiv.innerHTML = `<div class="spinner"></div>`;
             container.appendChild(spinnerDiv);
         }
      }

      try {
        if (ACTIVE_TAB === 'overview') {
          const stats = await apiRequest('/tables');
          renderOverview(stats);
        } else {
          TABLE_DATA = await apiRequest(`/${ACTIVE_TAB}`);
          renderTableData();
        }
      } catch (err) {
        container.innerHTML = `<div style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--danger); font-weight: 600; padding: 24px; border-radius: 12px; margin-top: 24px;">Error: ${err.message}. Make sure the backend server is running and accessible.</div>`;
      } finally {
        container.classList.remove('loading');
        const spinner = document.getElementById('global-spinner');
        if(spinner) spinner.remove();
      }
    }

    // Render Overview Statistics
    function renderOverview(stats) {
      const container = document.getElementById('tab-content');
      container.innerHTML = `
        <div class="overview-grid">
          <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div>
              <div class="stat-num">${stats.users}</div>
              <div class="stat-label">Users</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🗂️</div>
            <div>
              <div class="stat-num">${stats.categories}</div>
              <div class="stat-label">Categories</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">📝</div>
            <div>
              <div class="stat-num">${stats.words}</div>
              <div class="stat-label">Words</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🏆</div>
            <div>
              <div class="stat-num">${stats.badges}</div>
              <div class="stat-label">Badges</div>
            </div>
          </div>
        </div>

    // Modal control Actions
    function openCreateModal() {
      document.getElementById('modal-title').innerText = `Add New ${ACTIVE_TAB.slice(0, -1)}`;
      generateFormFields();
      document.getElementById('crud-modal').classList.add('show');
    }

    function openEditModal(id) {
      const record = TABLE_DATA.find(r => r.id === id);
      if (!record) return;
      document.getElementById('modal-title').innerText = `Edit ${ACTIVE_TAB.slice(0, -1)}`;
      generateFormFields(record);
      document.getElementById('crud-modal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('crud-modal').classList.remove('show');
    }

    // Save Submit Actions
    async function handleFormSubmit(e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const payload = {};

      formData.forEach((value, key) => {
        if (key === 'onboarded' || key === 'isLocked') {
          payload[key] = true;
        } else {
          payload[key] = value;
        }
      });

      // Special checks for checkboxes
      if (ACTIVE_TAB === 'users' && !payload.hasOwnProperty('onboarded')) {
        payload.onboarded = false;
      }
      if (ACTIVE_TAB === 'categories' && !payload.hasOwnProperty('isLocked')) {
        payload.isLocked = false;
      }

      try {
        let endpoint = `/${ACTIVE_TAB}`;
        if (ACTIVE_TAB === 'users' && payload.id) {
          endpoint = `/users/${payload.id}`;
        }
        
        await apiRequest(endpoint, {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        closeModal();
        loadTabContent();
      } catch (err) {
        alert(`Error saving record: ${err.message}`);
      }
    }

    // Record Deletions
    async function deleteRecord(id) {
      if (!confirm('Are you absolutely sure you want to delete this record?')) return;
      try {
        await apiRequest(`/${ACTIVE_TAB}/${id}`, {
          method: 'DELETE'
        });
        loadTabContent();
      } catch (err) {
        alert(`Error deleting record: ${err.message}`);
      }
    }

    // Revoke Badge Action
    async function deleteUserBadge(userId, badgeId) {
      if (!confirm('Are you sure you want to revoke this badge?')) return;
      try {
        await apiRequest(`/user-badges/${userId}/${badgeId}`, {
          method: 'DELETE'
        });
        loadTabContent();
      } catch (err) {
        alert(`Error revoking badge: ${err.message}`);
      }
    }

    // Utility helpers
    function escapeHtml(str) {
      if (!str) return '';
      return str.toString()
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getAvatarEmoji(name) {
      switch(name) {
        case 'Kanchha': return '🐼';
        case 'Mayur': return '🦚';
        case 'Danphe': return '🦅';
        case 'Mojo': return '🐵';
        default: return '👤';
      }
    }
  </script>
