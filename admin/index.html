<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muku Learning — Admin Control Center</title>
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #0a0e1a;
      --bg-card: #131929;
      --bg-input: #1a2238;  
      --border-color: #242e49;
      --text-main: #f3f4f6;
      --text-muted: #8b9bb4;
      --accent: #ffb800;
      --accent-hover: #e0a200;
      --primary-blue: #3b82f6;
      --danger: #ef4444;
      --success: #10b981;
      --font-title: 'Outfit', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: var(--font-body);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── AUTHENTICATION PAGE ── */
    #auth-page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: radial-gradient(circle at 10% 20%, rgba(255, 184, 0, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 40%);
    }

    .login-container {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
      animation: fadeInUp 0.5s ease-out;
    }

    .brand-logo {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .login-title {
      font-family: var(--font-title);
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 5px;
    }

    .login-sub {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 30px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text-main);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      border-color: var(--accent);
    }

    .btn {
      width: 100%;
      background: var(--accent);
      color: #1a1a1a;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover {
      background: var(--accent-hover);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .error-msg {
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 15px;
      display: none;
    }

    /* ── DASHBOARD LAYOUT ── */
    #dashboard-page {
      display: none;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      background: var(--bg-card);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: sticky;
      top: 0;
    }

    .sidebar-brand {
      padding: 24px;
      border-bottom: 1px solid var(--border-color);
      font-family: var(--font-title);
      font-size: 1.4rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-menu {
      list-style: none;
      padding: 20px 10px;
      flex-grow: 1;
      overflow-y: auto;
    }

    .menu-item {
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 5px;
      transition: all 0.2s;
    }

    .menu-item:hover, .menu-item.active {
      color: var(--text-main);
      background: var(--bg-input);
    }

    .menu-item.active {
      border-left: 4px solid var(--accent);
      padding-left: 12px;
    }

    .sidebar-footer {
      padding: 20px;
      border-top: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .admin-profile {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .admin-avatar {
      font-size: 1.5rem;
      background: var(--bg-input);
      width: 36px;
      height: 36px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
    }

    .admin-name {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .logout-btn {
      background: transparent;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
    }

    /* Main Area */
    .main-content {
      padding: 40px;
      overflow-y: auto;
      max-height: 100vh;
    }

    .content-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .content-title {
      font-family: var(--font-title);
      font-size: 2rem;
      font-weight: 800;
    }

    /* ── DASHBOARD BLOCKS & CARDS ── */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 15px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .stat-icon {
      font-size: 2rem;
      background: var(--bg-input);
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      color: var(--accent);
    }

    .stat-num {
      font-size: 1.8rem;
      font-weight: 700;
      font-family: var(--font-title);
    }

    .stat-label {
      color: var(--text-muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── TABLES AND CRUD ── */
    .table-container {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 15px;
      overflow: hidden;
      margin-top: 20px;
    }

    .table-actions {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
    }

    .search-input {
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 8px 16px;
      color: var(--text-main);
      width: 280px;
      outline: none;
    }

    .add-btn {
      background: var(--primary-blue);
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: filter 0.2s;
    }

    .add-btn:hover {
      filter: brightness(1.1);
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .data-table th, .data-table td {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .data-table th {
      background: rgba(0, 0, 0, 0.15);
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .data-table tr:last-child td {
      border-bottom: none;
    }

    .row-action {
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      margin-right: 15px;
    }

    .row-edit {
      color: var(--accent);
    }

    .row-delete {
      color: var(--danger);
    }

    /* ── MODAL WINDOWS ── */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 30px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
      animation: modalScale 0.3s ease-out;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-title {
      font-family: var(--font-title);
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 15px;
      margin-top: 25px;
    }

    .btn-secondary {
      background: var(--bg-input);
      color: var(--text-main);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: var(--border-color);
    }

    .btn-modal {
      width: auto;
      padding: 10px 24px;
    }

    /* Config panel at the top */
    .config-banner {
      display: flex;
      justify-content: space-between;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px 24px;
      margin-bottom: 30px;
      align-items: center;
    }

    .config-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes modalScale {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>

  <!-- ── AUTHENTICATION PAGE ── -->
  <div id="auth-page">
    <div class="login-container">
      <div class="brand-logo">🐼</div>
      <h1 class="login-title">Muku Control Panel</h1>
      <p class="login-sub">Admin database access portal</p>
      
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-input" placeholder="admin" required value="admin">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required value="admin123">
        </div>
        <button type="submit" class="btn">Sign In ➔</button>
      </form>
      <div id="login-error" class="error-msg">Invalid username or password.</div>
    </div>
  </div>

  <!-- ── DASHBOARD PAGE ── -->
  <div id="dashboard-page">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span>🐼</span> Muku Admin
      </div>
      <ul class="sidebar-menu">
        <li class="menu-item active" onclick="switchTab('overview', this)">📊 Overview</li>
        <li class="menu-item" onclick="switchTab('users', this)">👥 Users</li>
        <li class="menu-item" onclick="switchTab('categories', this)">🗂️ Categories</li>
        <li class="menu-item" onclick="switchTab('words', this)">📝 Words</li>
        <li class="menu-item" onclick="switchTab('progress', this)">📈 Progress</li>
        <li class="menu-item" onclick="switchTab('sessions', this)">🎓 Sessions</li>
        <li class="menu-item" onclick="switchTab('badges', this)">🏆 Badges</li>
        <li class="menu-item" onclick="switchTab('user-badges', this)">🏅 User Badges</li>
      </ul>
      <div class="sidebar-footer">
        <div class="admin-profile">
          <div class="admin-avatar">🐼</div>
          <div class="admin-name">SysAdmin</div>
        </div>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
      </div>
    </aside>

    <!-- Main Content Panel -->
    <main class="main-content">
      <!-- Config Banner -->
      <div class="config-banner">
        <span class="config-title">Connected API:</span>
        <input type="text" id="api-url-input" class="search-input" style="width: 250px; padding: 6px 12px; font-size: 0.85rem;" value="http://localhost:3000">
      </div>

      <div class="content-header">
        <h2 class="content-title" id="tab-title">Dashboard Overview</h2>
        <div id="tab-header-actions"></div>
      </div>

      <!-- Dynamic Content Wrapper -->
      <div id="tab-content">
        <!-- Renders dynamically -->
      </div>
    </main>
  </div>

  <!-- ── CRUD DYNAMIC FORM MODAL ── -->
  <div class="modal-overlay" id="crud-modal">
    <div class="modal-content">
      <h3 class="modal-title" id="modal-title">Form</h3>
      <form id="crud-form" onsubmit="handleFormSubmit(event)">
        <div id="form-fields">
          <!-- Fields rendered dynamically based on active tab -->
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn btn-secondary btn-modal" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-modal">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── JAVASCRIPT LOGIC ── -->
  <script>
    // State Variables
    let JWT_TOKEN = localStorage.getItem('muku_admin_jwt') || '';
    let ACTIVE_TAB = 'overview';
    let TABLE_DATA = [];

    // On Load Check
    window.onload = () => {
      if (JWT_TOKEN) {
        showDashboard();
      } else {
        showLogin();
      }
    };

    function getApiUrl() {
      return document.getElementById('api-url-input').value.trim();
    }

    // Helper for requests
    async function apiRequest(endpoint, options = {}) {
      const headers = {
        'Content-Type': 'application/json',
      };
      if (JWT_TOKEN) {
        headers['Authorization'] = `Bearer ${JWT_TOKEN}`;
      }

      const res = await fetch(`${getApiUrl()}/api/admin${endpoint}`, {
        ...options,
        headers: {
          ...headers,
          ...options.headers
        }
      });

      if (!res.ok) {
        if (res.status === 403 || res.status === 401) {
          handleLogout();
          throw new Error('Session expired or unauthorized');
        }
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `Server responded with ${res.status}`);
      }
      return res.json();
    }

    // Login Action
    async function handleLogin(e) {
      e.preventDefault();
      const usernameInput = document.getElementById('username').value.trim();
      const passwordInput = document.getElementById('password').value.trim();
      const errorDiv = document.getElementById('login-error');
      errorDiv.style.display = 'none';

      try {
        const res = await fetch(`${getApiUrl()}/api/users/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: usernameInput, password: passwordInput })
        });

        if (!res.ok) {
          throw new Error('Unauthorized');
        }

        const data = await res.json();
        if (data.user.username !== 'admin') {
          alert('Access denied: System admin role required.');
          return;
        }

        JWT_TOKEN = data.token;
        localStorage.setItem('muku_admin_jwt', JWT_TOKEN);
        showDashboard();
      } catch (err) {
        errorDiv.style.display = 'block';
      }
    }

    function showLogin() {
      document.getElementById('auth-page').style.display = 'flex';
      document.getElementById('dashboard-page').style.display = 'none';
    }

    function showDashboard() {
      document.getElementById('auth-page').style.display = 'none';
      document.getElementById('dashboard-page').style.display = 'grid';
      switchTab('overview');
    }

    function handleLogout() {
      JWT_TOKEN = '';
      localStorage.removeItem('muku_admin_jwt');
      showLogin();
    }

    // Switch menu tabs
    function switchTab(tabName, element) {
      ACTIVE_TAB = tabName;
      document.getElementById('tab-title').innerText = tabName.charAt(0).toUpperCase() + tabName.slice(1);
      
      // Update menu highlighting
      if (element) {
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
      }

      loadTabContent();
    }

    // Load active tab contents
    async function loadTabContent() {
      const container = document.getElementById('tab-content');
      const actionContainer = document.getElementById('tab-header-actions');
      container.innerHTML = '<div style="color: var(--text-muted);">Fetching database records...</div>';
      actionContainer.innerHTML = '';

      try {
        if (ACTIVE_TAB === 'overview') {
          const stats = await apiRequest('/tables');
          renderOverview(stats);
        } else {
          TABLE_DATA = await apiRequest(`/${ACTIVE_TAB}`);
          renderTableData();
        }
      } catch (err) {
        container.innerHTML = `<div style="color: var(--danger); font-weight: 600;">Error: ${err.message}. Make sure the backend server is running and accessible.</div>`;
      }
    }

    // Render Overview Statistics
    function renderOverview(stats) {
      const container = document.getElementById('tab-content');
      container.innerHTML = `
        <div class="overview-grid">
          <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div>
              <div class="stat-num">${stats.users}</div>
              <div class="stat-label">Users</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🗂️</div>
            <div>
              <div class="stat-num">${stats.categories}</div>
              <div class="stat-label">Categories</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">📝</div>
            <div>
              <div class="stat-num">${stats.words}</div>
              <div class="stat-label">Words</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🏆</div>
            <div>
              <div class="stat-num">${stats.badges}</div>
              <div class="stat-label">Badges</div>
            </div>
          </div>
        </div>

        <div style="background: var(--bg-card); padding: 30px; border-radius: 15px; border: 1px solid var(--border-color);">
          <h4 style="font-family: var(--font-title); font-size: 1.2rem; margin-bottom: 15px;">Database Integrity Console</h4>
          <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.6;">
            Welcome to the Muku Admin Control Center. You are currently connected with <strong>superuser bypass context</strong>, meaning Row-Level Security (RLS) is disabled for admin updates, permitting direct edits across all schema records. Make modifications with caution as updates propagate instantly.
          </p>
        </div>
      `;
    }

    // Dynamic rendering of Table Lists
    function renderTableData() {
      const container = document.getElementById('tab-content');
      const actionContainer = document.getElementById('tab-header-actions');

      // Setup Search/Create header options
      if (ACTIVE_TAB !== 'sessions') {
        actionContainer.innerHTML = `
          <button class="add-btn" onclick="openCreateModal()">✚ Add New Record</button>
        `;
      }

      if (TABLE_DATA.length === 0) {
        container.innerHTML = `
          <div class="table-container">
            <div style="padding: 40px; text-align: center; color: var(--text-muted);">No records found in this table.</div>
          </div>
        `;
        return;
      }

      let headerHtml = '';
      let rowsHtml = '';

      if (ACTIVE_TAB === 'users') {
        headerHtml = '<tr><th>Avatar</th><th>Name</th><th>Username</th><th>XP</th><th>Streak</th><th>Hearts</th><th>Actions</th></tr>';
        rowsHtml = TABLE_DATA.map(user => `
          <tr>
            <td><span style="font-size: 1.5rem;">${getAvatarEmoji(user.avatar)}</span></td>
            <td><strong>${escapeHtml(user.name)}</strong></td>
            <td>@${escapeHtml(user.username)}</td>
            <td>⭐ ${user.xp}</td>
            <td>🔥 ${user.streak}</td>
            <td>❤️ ${user.hearts}</td>
            <td>
              <button class="row-action row-edit" onclick="openEditModal('${user.id}')">Edit</button>
              <button class="row-action row-delete" onclick="deleteRecord('${user.id}')">Delete</button>
            </td>
          </tr>
        `).join('');
      } else if (ACTIVE_TAB === 'categories') {
        headerHtml = '<tr><th>Emoji</th><th>Name</th><th>Slug</th><th>Order</th><th>Locked?</th><th>Unlock Lvl</th><th>Actions</th></tr>';
        rowsHtml = TABLE_DATA.map(cat => `
          <tr>
            <td><span style="font-size: 1.5rem;">${cat.emoji}</span></td>
            <td><strong>${escapeHtml(cat.name)}</strong></td>
            <td><code>${cat.slug}</code></td>
            <td>${cat.order}</td>
            <td>${cat.isLocked ? '🔒 Yes' : '🔓 No'}</td>
            <td>${cat.unlockLevel}</td>
            <td>
              <button class="row-action row-edit" onclick="openEditModal('${cat.id}')">Edit</button>
              <button class="row-action row-delete" onclick="deleteRecord('${cat.id}')">Delete</button>
            </td>
          </tr>
        `).join('');
      } else if (ACTIVE_TAB === 'words') {
        headerHtml = '<tr><th>Emoji</th><th>Nepali</th><th>Roman</th><th>English</th><th>Category</th><th>Order</th><th>Actions</th></tr>';
        rowsHtml = TABLE_DATA.map(word => `
          <tr>
            <td><span style="font-size: 1.5rem;">${word.emoji}</span></td>
            <td><strong>${escapeHtml(word.nepali)}</strong></td>
            <td>${escapeHtml(word.nepaliRoman)}</td>
            <td>${escapeHtml(word.english)}</td>
            <td><span style="color: var(--accent); font-weight:600;">${word.category ? escapeHtml(word.category.name) : 'None'}</span></td>
            <td>${word.order}</td>
            <td>
              <button class="row-action row-edit" onclick="openEditModal('${word.id}')">Edit</button>
              <button class="row-action row-delete" onclick="deleteRecord('${word.id}')">Delete</button>

          </tr>
        `).join('');
      } else if (ACTIVE_TAB === 'progress') {
        headerHtml = '<tr><th>User</th><th>Category</th><th>Words Learned</th><th>Accuracy</th><th>Last Played</th><th>Actions</th></tr>';
        rowsHtml = TABLE_DATA.map(prog => `
          <tr>
            <td><strong>${prog.user ? escapeHtml(prog.user.name) : 'Deleted User'}</strong></td>
            <td>${prog.category ? escapeHtml(prog.category.name) : 'Deleted Cat'}</td>
            <td>${prog.wordsLearned}</td>
            <td>${prog.totalAnswers > 0 ? Math.round((prog.correctAnswers / prog.totalAnswers) * 100) : 0}%</td>
            <td>${prog.lastPlayedAt ? new Date(prog.lastPlayedAt).toLocaleDateString() : 'Never'}</td>
            <td>
              <button class="row-action row-edit" onclick="openEditModal('${prog.id}')">Edit</button>
              <button class="row-action row-delete" onclick="deleteRecord('${prog.id}')">Delete</button>
            </td>
          </tr>
        `).join('');
      } else if (ACTIVE_TAB === 'sessions') {
        headerHtml = '<tr><th>User</th><th>Category</th><th>XP Gained</th><th>Accuracy</th><th>Duration (s)</th><th>Locality</th><th>Date</th><th>Actions</th></tr>';
        rowsHtml = TABLE_DATA.map(session => `
          <tr>
            <td><strong>${session.user ? escapeHtml(session.user.name) : 'Deleted User'}</strong></td>
            <td>${session.category ? escapeHtml(session.category.name) : 'Deleted Cat'}</td>
            <td>⭐ +${session.xpGained}</td>
            <td>${Math.round(session.accuracy * 100)}%</td>
            <td>⏱️ ${session.durationSec}s</td>
            <td>📍 ${escapeHtml(session.locality || 'Global')}</td>
            <td>${new Date(session.completedAt).toLocaleString()}</td>
            <td>
              <button class="row-action row-delete" onclick="deleteRecord('${session.id}')">Delete</button>
            </td>
          </tr>
        `).join('');
      } else if (ACTIVE_TAB === 'badges') {
        headerHtml = '<tr><th>Emoji</th><th>Badge Name</th><th>Slug</th><th>Description</th><th>Actions</th></tr>';
        rowsHtml = TABLE_DATA.map(badge => `
          <tr>
            <td><span style="font-size: 1.5rem;">${badge.emoji}</span></td>
            <td><strong>${escapeHtml(badge.name)}</strong></td>
            <td><code>${badge.slug}</code></td>
            <td>${escapeHtml(badge.description || '')}</td>
            <td>
              <button class="row-action row-edit" onclick="openEditModal('${badge.id}')">Edit</button>
              <button class="row-action row-delete" onclick="deleteRecord('${badge.id}')">Delete</button>
            </td>
          </tr>
        `).join('');
      } else if (ACTIVE_TAB === 'user-badges') {
        headerHtml = '<tr><th>User</th><th>Badge Awarded</th><th>Awarded At</th><th>Actions</th></tr>';
        rowsHtml = TABLE_DATA.map(ub => `
          <tr>
            <td><strong>${ub.user ? escapeHtml(ub.user.name) : 'Deleted User'}</strong></td>
            <td><span style="font-size: 1.2rem; margin-right: 5px;">${ub.badge ? ub.badge.emoji : ''}</span> ${ub.badge ? escapeHtml(ub.badge.name) : 'Deleted Badge'}</td>
            <td>${new Date(ub.awardedAt).toLocaleString()}</td>
            <td>
              <button class="row-action row-delete" onclick="deleteUserBadge('${ub.userId}', '${ub.badgeId}')">Revoke</button>
            </td>
          </tr>
        `).join('');
      }

      container.innerHTML = `
        <div class="table-container">
          <table class="data-table">
            <thead>
              ${headerHtml}
            </thead>
            <tbody>
              ${rowsHtml}
            </tbody>
          </table>
        </div>
      `;
    }

    // Modal Form Generation dynamically
    function generateFormFields(record = null) {
      const container = document.getElementById('form-fields');
      container.innerHTML = '';

      if (record) {
        container.innerHTML += `<input type="hidden" name="id" value="${record.id}">`;
      }

      if (ACTIVE_TAB === 'users') {
        container.innerHTML += `
          <div class="form-group">
            <label>Display Name</label>
            <input type="text" name="name" class="form-input" required value="${record ? escapeHtml(record.name) : ''}">
          </div>
          <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" class="form-input" required value="${record ? escapeHtml(record.username) : ''}">
          </div>
          <div class="form-group">
            <label>Avatar</label>
            <select name="avatar" class="form-input">
              <option value="Kanchha" ${record?.avatar === 'Kanchha' ? 'selected' : ''}>Kanchha (Panda)</option>
              <option value="Mayur" ${record?.avatar === 'Mayur' ? 'selected' : ''}>Mayur (Peacock)</option>
              <option value="Danphe" ${record?.avatar === 'Danphe' ? 'selected' : ''}>Danphe (Lophophorus)</option>
              <option value="Mojo" ${record?.avatar === 'Mojo' ? 'selected' : ''}>Mojo (Monkey)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Age Group</label>
            <select name="ageGroup" class="form-input">
              <option value="4-6" ${record?.ageGroup === '4-6' ? 'selected' : ''}>4-6 years</option>
              <option value="7-10" ${record?.ageGroup === '7-10' ? 'selected' : ''}>7-10 years</option>
            </select>
          </div>
          <div class="form-group">
            <label>Locality</label>
            <input type="text" name="locality" class="form-input" value="${record ? escapeHtml(record.locality || '') : ''}">
          </div>
          <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
            <div>
              <label>XP</label>
              <input type="number" name="xp" class="form-input" required value="${record ? record.xp : 0}">
            </div>
            <div>
              <label>Streak</label>
              <input type="number" name="streak" class="form-input" required value="${record ? record.streak : 0}">
            </div>
            <div>
              <label>Hearts</label>
              <input type="number" name="hearts" class="form-input" required value="${record ? record.hearts : 5}">
            </div>
          </div>
          <div class="form-group">
            <label><input type="checkbox" name="onboarded" ${record?.onboarded !== false ? 'checked' : ''}> Onboarded?</label>
          </div>
        `;
      } else if (ACTIVE_TAB === 'categories') {
        container.innerHTML += `
          <div class="form-group">
            <label>Category Name</label>
            <input type="text" name="name" class="form-input" required value="${record ? escapeHtml(record.name) : ''}">
          </div>
          <div class="form-group">
            <label>Slug</label>
            <input type="text" name="slug" class="form-input" required value="${record ? escapeHtml(record.slug) : ''}" placeholder="e.g. greetings">
          </div>
          <div class="form-group">
            <label>Emoji</label>
            <input type="text" name="emoji" class="form-input" required value="${record ? escapeHtml(record.emoji) : ''}" placeholder="e.g. 👋">
          </div>
          <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
              <label>Color</label>
              <input type="text" name="color" class="form-input" required value="${record ? escapeHtml(record.color) : '#FFFDE7'}">
            </div>
            <div>
              <label>Border Color</label>
              <input type="text" name="borderColor" class="form-input" required value="${record ? escapeHtml(record.borderColor) : '#FFF9C4'}">
            </div>
          </div>
          <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
              <label>Display Order</label>
              <input type="number" name="order" class="form-input" required value="${record ? record.order : 0}">
            </div>
            <div>
              <label>Unlock Level</label>
              <input type="number" name="unlockLevel" class="form-input" required value="${record ? record.unlockLevel : 0}">
            </div>
          </div>
          <div class="form-group">
            <label><input type="checkbox" name="isLocked" ${record?.isLocked ? 'checked' : ''}> Locked?</label>
          </div>
        `;
      } else if (ACTIVE_TAB === 'words') {
        // We need category lists to populate choices
        const categories = document.querySelector('.menu-item:nth-child(3)').classList.contains('active') 
          ? TABLE_DATA 
          : [];
        
        // Let's render a normal input for Category ID or let them input it
        container.innerHTML += `
          <div class="form-group">
            <label>Category ID</label>
            <input type="text" name="categoryId" class="form-input" required value="${record ? escapeHtml(record.categoryId) : ''}" placeholder="Paste UUID of Category">
          </div>
          <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
              <label>Nepali Text</label>
              <input type="text" name="nepali" class="form-input" required value="${record ? escapeHtml(record.nepali) : ''}">
            </div>
            <div>
              <label>Roman Nepali</label>
              <input type="text" name="nepaliRoman" class="form-input" required value="${record ? escapeHtml(record.nepaliRoman) : ''}">
            </div>
          </div>
          <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
              <label>English Text</label>
              <input type="text" name="english" class="form-input" required value="${record ? escapeHtml(record.english) : ''}">
            </div>
            <div>
              <label>Phonetic Pronunciation</label>
              <input type="text" name="phonetic" class="form-input" required value="${record ? escapeHtml(record.phonetic) : ''}">
            </div>
          </div>
          <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
              <label>Emoji</label>
              <input type="text" name="emoji" class="form-input" required value="${record ? escapeHtml(record.emoji) : ''}">
            </div>
            <div>
              <label>Display Order</label>
              <input type="number" name="order" class="form-input" required value="${record ? record.order : 0}">
            </div>
          </div>
          <div class="form-group">
            <label>Audio URL (Optional)</label>
            <input type="text" name="audioUrl" class="form-input" value="${record?.audioUrl ? escapeHtml(record.audioUrl) : ''}">
          </div>
        `;
      } else if (ACTIVE_TAB === 'progress') {
        container.innerHTML += `
          <div class="form-group">
            <label>User ID</label>
            <input type="text" name="userId" class="form-input" required value="${record ? escapeHtml(record.userId) : ''}">
          </div>
          <div class="form-group">
            <label>Category ID</label>
            <input type="text" name="categoryId" class="form-input" required value="${record ? escapeHtml(record.categoryId) : ''}">
          </div>
          <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
            <div>
              <label>Words Learned</label>
              <input type="number" name="wordsLearned" class="form-input" required value="${record ? record.wordsLearned : 0}">
            </div>
            <div>
              <label>Correct Ans</label>
              <input type="number" name="correctAnswers" class="form-input" required value="${record ? record.correctAnswers : 0}">
            </div>
            <div>
              <label>Total Ans</label>
              <input type="number" name="totalAnswers" class="form-input" required value="${record ? record.totalAnswers : 0}">
            </div>
          </div>
        `;
      } else if (ACTIVE_TAB === 'badges') {
        container.innerHTML += `
          <div class="form-group">
            <label>Badge Name</label>
            <input type="text" name="name" class="form-input" required value="${record ? escapeHtml(record.name) : ''}">
          </div>
          <div class="form-group">
            <label>Slug</label>
            <input type="text" name="slug" class="form-input" required value="${record ? escapeHtml(record.slug) : ''}">
          </div>
          <div class="form-group">
            <label>Emoji Icon</label>
            <input type="text" name="emoji" class="form-input" required value="${record ? escapeHtml(record.emoji) : ''}" placeholder="e.g. 🏆">
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea name="description" class="form-input" style="height: 80px;">${record ? escapeHtml(record.description || '') : ''}</textarea>
          </div>
        `;
      } else if (ACTIVE_TAB === 'user-badges') {
        container.innerHTML += `
          <div class="form-group">
            <label>User ID</label>
            <input type="text" name="userId" class="form-input" required placeholder="User UUID">
          </div>
          <div class="form-group">
            <label>Badge ID</label>
            <input type="text" name="badgeId" class="form-input" required placeholder="Badge UUID">
          </div>
        `;
      }
    }

    // Modal control Actions
    function openCreateModal() {
      document.getElementById('modal-title').innerText = `Add New ${ACTIVE_TAB.slice(0, -1)}`;
      generateFormFields();
      document.getElementById('crud-modal').style.display = 'flex';
    }

    function openEditModal(id) {
      const record = TABLE_DATA.find(r => r.id === id);
      if (!record) return;
      document.getElementById('modal-title').innerText = `Edit ${ACTIVE_TAB.slice(0, -1)}`;
      generateFormFields(record);
      document.getElementById('crud-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('crud-modal').style.display = 'none';
    }

    // Save Submit Actions
    async function handleFormSubmit(e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const payload = {};

      formData.forEach((value, key) => {
        if (key === 'onboarded' || key === 'isLocked') {
          payload[key] = true;
        } else {
          payload[key] = value;
        }
      });

      // Special checks for checkboxes
      if (ACTIVE_TAB === 'users' && !payload.hasOwnProperty('onboarded')) {
        payload.onboarded = false;
      }
      if (ACTIVE_TAB === 'categories' && !payload.hasOwnProperty('isLocked')) {
        payload.isLocked = false;
      }

      try {
        let endpoint = `/${ACTIVE_TAB}`;
        if (ACTIVE_TAB === 'users' && payload.id) {
          endpoint = `/users/${payload.id}`;
        }
        
        await apiRequest(endpoint, {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        closeModal();
        loadTabContent();
      } catch (err) {
        alert(`Error saving record: ${err.message}`);
      }
    }

    // Record Deletions
    async function deleteRecord(id) {
      if (!confirm('Are you absolutely sure you want to delete this record?')) return;
      try {
        await apiRequest(`/${ACTIVE_TAB}/${id}`, {
          method: 'DELETE'
        });
        loadTabContent();
      } catch (err) {
        alert(`Error deleting record: ${err.message}`);
      }
    }

    // Revoke Badge Action
    async function deleteUserBadge(userId, badgeId) {
      if (!confirm('Are you sure you want to revoke this badge?')) return;
      try {
        await apiRequest(`/user-badges/${userId}/${badgeId}`, {
          method: 'DELETE'
        });
        loadTabContent();
      } catch (err) {
        alert(`Error revoking badge: ${err.message}`);
      }
    }

    // Utility helpers
    function escapeHtml(str) {
      if (!str) return '';
      return str.toString()
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getAvatarEmoji(name) {
      switch(name) {
        case 'Kanchha': return '🐼';
        case 'Mayur': return '🦚';
        case 'Danphe': return '🦅';
        case 'Mojo': return '🐵';
        default: return '👤';
      }
    }
  </script>
